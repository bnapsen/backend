<svg width="640" height="360" viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Royal SuperSplash Blackjack cover art">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#0f6b42"/>
      <stop offset="100%" stop-color="#08311f"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f1f1"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="#0a1220"/>
  <rect x="18" y="18" width="604" height="324" rx="28" fill="url(#bg)" stroke="#f7c95c" stroke-width="6"/>
  <text x="320" y="78" text-anchor="middle" fill="#ffe9a8" font-family="Inter, Arial" font-size="34" font-weight="700">ROYAL NEON BLACKJACK</text>

  <g transform="translate(210 120) rotate(-12)">
    <rect width="120" height="170" rx="12" fill="url(#card)"/>
    <text x="12" y="32" fill="#ba0f2e" font-family="Inter" font-size="30" font-weight="700">A♥</text>
    <text x="60" y="102" text-anchor="middle" fill="#ba0f2e" font-size="56">♥</text>
  </g>

  <g transform="translate(320 128) rotate(10)">
    <rect width="120" height="170" rx="12" fill="url(#card)"/>
    <text x="12" y="32" fill="#131313" font-family="Inter" font-size="30" font-weight="700">K♠</text>
    <text x="60" y="102" text-anchor="middle" fill="#131313" font-size="56">♠</text>
  </g>

  <text x="320" y="320" text-anchor="middle" fill="#8af6d8" font-family="Inter" font-size="18">Deal • Hit • Stand • Double Down</text>
</svg>
