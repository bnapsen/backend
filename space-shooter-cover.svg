<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Space Shooter cover art</title>
  <desc id="desc">Colorful space shooter artwork with glowing title and a starfighter.</desc>
  <defs>
    <radialGradient id="space" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#1c4dff"/>
      <stop offset="40%" stop-color="#3b1d92"/>
      <stop offset="100%" stop-color="#09021c"/>
    </radialGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff07d"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>
    <linearGradient id="cool" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6fbff"/>
      <stop offset="100%" stop-color="#2aa4ff"/>
    </linearGradient>
    <radialGradient id="planet" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#ffc75c"/>
      <stop offset="100%" stop-color="#ba3e00"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#space)"/>
  <g fill="#fff" opacity="0.9">
    <circle cx="120" cy="120" r="2"/><circle cx="260" cy="220" r="1.5"/><circle cx="420" cy="160" r="2"/>
    <circle cx="620" cy="85" r="2"/><circle cx="810" cy="170" r="1.5"/><circle cx="1060" cy="120" r="2"/>
    <circle cx="1340" cy="200" r="2"/><circle cx="1490" cy="120" r="1.8"/><circle cx="1400" cy="420" r="2"/>
    <circle cx="180" cy="620" r="2"/><circle cx="380" cy="760" r="2"/><circle cx="980" cy="760" r="1.7"/>
  </g>

  <circle cx="1420" cy="620" r="230" fill="url(#planet)" opacity="0.95"/>
  <circle cx="250" cy="140" r="90" fill="#a34cff" opacity="0.7"/>

  <g stroke="#ff7b00" stroke-width="10" stroke-linecap="round" opacity="0.8">
    <line x1="140" y1="560" x2="360" y2="440"/>
    <line x1="1150" y1="170" x2="960" y2="300"/>
    <line x1="1320" y1="320" x2="1180" y2="350"/>
  </g>

  <g transform="translate(800 350)">
    <text x="0" y="0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="190" font-weight="800" fill="url(#warm)" stroke="#5f1b00" stroke-width="18" paint-order="stroke">SPACE</text>
    <text x="0" y="200" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="180" font-weight="800" fill="url(#cool)" stroke="#032b83" stroke-width="18" paint-order="stroke">SHOOTER</text>
  </g>

  <g transform="translate(780 640)">
    <polygon points="0,-90 180,20 115,55 95,110 -95,110 -115,55 -180,20" fill="#f2f5ff" stroke="#4a5b9f" stroke-width="8"/>
    <polygon points="0,-65 60,20 0,55 -60,20" fill="#ff5e2f"/>
    <ellipse cx="-70" cy="65" rx="35" ry="28" fill="#27c7ff"/>
    <ellipse cx="70" cy="65" rx="35" ry="28" fill="#27c7ff"/>
    <path d="M-95 95 L-220 185" stroke="#ffd54f" stroke-width="22" stroke-linecap="round"/>
    <path d="M95 95 L220 185" stroke="#ffd54f" stroke-width="22" stroke-linecap="round"/>
  </g>
</svg>
