<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Neon Chess Arena Cover</title>
  <desc id="desc">A glowing chess board with neon king and knight.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071426"/>
      <stop offset="1" stop-color="#1b0d33"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3ee7ff"/>
      <stop offset="1" stop-color="#a66bff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  <g transform="translate(220 120)">
    <rect x="0" y="0" width="420" height="420" rx="22" fill="#0a1730" stroke="url(#neon)" stroke-width="4"/>
    <g>
      <rect x="0" y="0" width="52.5" height="52.5" fill="#cadcff"/>
      <rect x="52.5" y="0" width="52.5" height="52.5" fill="#5f76bd"/>
      <rect x="105" y="0" width="52.5" height="52.5" fill="#cadcff"/>
      <rect x="157.5" y="0" width="52.5" height="52.5" fill="#5f76bd"/>
      <rect x="210" y="0" width="52.5" height="52.5" fill="#cadcff"/>
      <rect x="262.5" y="0" width="52.5" height="52.5" fill="#5f76bd"/>
      <rect x="315" y="0" width="52.5" height="52.5" fill="#cadcff"/>
      <rect x="367.5" y="0" width="52.5" height="52.5" fill="#5f76bd"/>
    </g>
    <g opacity="0.9" fill="url(#neon)" filter="url(#glow)">
      <path d="M285 340h-70l10-20h15v-120h-25l20-25h15v-30h-15v-18h15v-18h20v18h15v18h-15v30h15l20 25h-25v120h15z"/>
      <path d="M95 355c40-14 62-52 52-94-11-47 22-96 77-95-11 12-20 29-20 50 0 34 22 63 53 74-7 7-17 14-31 18-28 8-44 23-54 47z"/>
    </g>
  </g>
  <text x="690" y="270" fill="#e7f3ff" font-family="Inter,Arial,sans-serif" font-size="78" font-weight="800">NEON CHESS</text>
  <text x="690" y="338" fill="#9ec7ff" font-family="Inter,Arial,sans-serif" font-size="34">MULTIPLAYER + BOT MODE</text>
</svg>
