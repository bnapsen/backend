<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500" role="img" aria-label="Neon Poker Royale cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#13062f"/>
      <stop offset="100%" stop-color="#0a2740"/>
    </linearGradient>
    <radialGradient id="felt" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#1ad2b2"/>
      <stop offset="100%" stop-color="#0a6a59"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <ellipse cx="400" cy="250" rx="330" ry="170" fill="url(#felt)" stroke="#4f2e17" stroke-width="18"/>
  <g transform="translate(270 160) rotate(-8)" filter="url(#glow)">
    <rect x="0" y="0" width="120" height="170" rx="12" fill="#ffffff"/>
    <text x="18" y="42" font-size="36" font-family="Inter, Arial" font-weight="800" fill="#cf1841">A♥</text>
  </g>
  <g transform="translate(340 150) rotate(4)" filter="url(#glow)">
    <rect x="0" y="0" width="120" height="170" rx="12" fill="#ffffff"/>
    <text x="18" y="42" font-size="36" font-family="Inter, Arial" font-weight="800" fill="#111827">K♠</text>
  </g>
  <g transform="translate(420 170) rotate(11)" filter="url(#glow)">
    <rect x="0" y="0" width="120" height="170" rx="12" fill="#ffffff"/>
    <text x="18" y="42" font-size="36" font-family="Inter, Arial" font-weight="800" fill="#cf1841">Q♦</text>
  </g>
  <g transform="translate(120 70)">
    <circle cx="0" cy="0" r="46" fill="#ffd860"/>
    <circle cx="0" cy="0" r="34" fill="none" stroke="#b56a04" stroke-width="6"/>
    <text x="-20" y="10" font-size="20" font-family="Inter, Arial" font-weight="800" fill="#5d3300">500</text>
  </g>
  <text x="400" y="435" text-anchor="middle" font-size="54" font-family="Inter, Arial" font-weight="900" letter-spacing="2" fill="#ff7ad3">NEON POKER ROYALE</text>
</svg>
