<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pool Rush</title>
  <link rel="stylesheet" href="pool.css" />
</head>
<body>
  <main class="game-wrap">
    <canvas id="poolTable" aria-label="pool game canvas"></canvas>

    <section class="hud" aria-live="polite">
      <h1>Pool Rush</h1>
      <p>Clear all targets before time runs out. Sink streaks build combo score.</p>
      <div class="stats">
        <span id="score">Score: 0</span>
        <span id="shots">Shots: 0</span>
        <span id="combo">Combo: x1</span>
        <span id="time">Time: 60</span>
        <span id="remaining">Targets: 0</span>
      </div>
      <button id="resetBtn" type="button">New Run</button>
      <a class="back-link" href="index.html">← Back to home</a>
    </section>
  </main>

  <script src="pool.js"></script>
</body>
</html>
