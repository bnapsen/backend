<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pool Rush Challenge</title>
  <link rel="stylesheet" href="pool.css" />
</head>
<body>
  <main class="game-wrap">
    <canvas id="poolTable" aria-label="pool game canvas"></canvas>

    <button id="hudToggle" class="hud-toggle" type="button" aria-expanded="true" aria-controls="gameHud">Hide menu</button>

    <section id="gameHud" class="hud" aria-live="polite">
      <h1>Pool Rush</h1>
      <p>Clear all SuperSplash targets before you run out of shots. Chain pockets to build combos.</p>
      <label class="mode-picker" for="gameMode">
        Game mode
        <select id="gameMode" aria-label="Select pool game mode">
          <option value="eightBall">8-Ball</option>
          <option value="nineBall">9-Ball</option>
          <option value="straightPool">Straight Pool</option>
        </select>
      </label>
      <div class="stats">
        <span id="score">Score: 0</span>
        <span id="level">Mode: 8-Ball</span>
        <span id="shots">Shots Taken: 0</span>
        <span id="combo">Combo: x1</span>
      </div>
      <p class="status" id="status">Sink all target balls to start your run.</p>
      <div class="controls">
        <button id="resetBtn" type="button">Restart Run</button>
        <a class="back-link" href="index.html">← Back to home</a>
      </div>
    </section>
  </main>

  <script src="pool.js"></script>
</body>
</html>
